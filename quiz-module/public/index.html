<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Check-in | MindMate</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    
    <div class="container min-vh-100 d-flex flex-column justify-content-center py-5">
        
        <div class="text-center mb-5 brand-header">
            <h1 class="display-5 fw-bold text-gradient">MindMate Assessment</h1>
            <p class="text-secondary lead">Take a moment to check in with your emotions.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div id="quiz-container" class="card glass-card shadow-lg border-0 d-none">
                    <div class="card-body p-5">
                        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
                            <span id="question-indicator" class="badge bg-primary text-light px-3 py-2 fs-6 rounded-pill">Question 1/10</span>
                            <div class="progress flex-grow-1 ms-3" style="height: 10px; background-color: #2a2a35;">
                                <div id="progress-bar" class="progress-bar bg-info" role="progressbar" style="width: 10%;" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>

                        <h3 id="question-text" class="fw-semibold text-light mb-4 text-fade-in">Loading question...</h3>
                        
                        <div id="options-container" class="d-flex flex-column gap-3 mb-4">
                            <!-- Radio buttons will be injected here -->
                        </div>

                        <div class="d-flex justify-content-end mt-5">
                            <button id="next-btn" class="btn btn-outline-info px-4 py-2 rounded-pill fw-bold action-btn" disabled>Next Question</button>
                            <button id="submit-btn" class="btn btn-primary px-5 py-2 rounded-pill fw-bold action-btn d-none">Submit Assessment</button>
                        </div>
                    </div>
                </div>

                <div id="loader" class="text-center mt-5">
                    <div class="spinner-border text-info" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-secondary">Gathering questions...</p>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
